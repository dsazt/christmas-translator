name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
       
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
           
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.21.2
           
      - name: Build web app
        run: |
          cd src
          flet publish app.py --base-url /christmas-translator/
          mkdir -p ../dist
          cp -r dist/* ../dist/
           
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
